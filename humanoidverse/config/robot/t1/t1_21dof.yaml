# @package _global_

defaults:
  - robot_base

robot:
  # Observation parameters
  num_bodies: 22
  dof_obs_size: 21
  actions_dim: 21
  lower_body_actions_dim: 13 # Yuanhang
  upper_body_actions_dim: 8 # Yuanhang
  policy_obs_dim: -1 # Jiawei
  critic_obs_dim: -1
  # policy_obs_dim: 45 # Jiawei
  # critic_obs_dim: 238
  # policy_obs_dim: 45 # Jiawei
  # policy_obs_dim: 241 # Jiawei
  # self_obs_max_coords: 298  # ${eval:1+20*(3+6+3+3)-3}

  key_bodies: ["ankle_roll_l_link", "ankle_roll_r_link"]
  contact_bodies: [ "ankle_roll_l_link", "ankle_roll_r_link" ]
  num_feet: 2
  right_foot_name: "ankle_roll_r_link"
  left_foot_name: "ankle_roll_l_link"
  foot_name: "ankle_roll"
  knee_name: "knee"
  has_torso: True
  torso_name: "waist_link"
  has_upper_body_dof: True
  dof_names: ['hip_roll_l_joint', 'hip_yaw_l_joint', 'hip_pitch_l_joint', 'knee_pitch_l_joint', 'ankle_pitch_l_joint', 'ankle_roll_l_joint',
              'hip_roll_r_joint', 'hip_yaw_r_joint', 'hip_pitch_r_joint', 'knee_pitch_r_joint', 'ankle_pitch_r_joint', 'ankle_roll_r_joint',
              'waist_joint',
              'shoulder_pitch_l_joint', 'shoulder_roll_l_joint', 'shoulder_yaw_l_joint', 'elbow_l_joint',
              'shoulder_pitch_r_joint', 'shoulder_roll_r_joint', 'shoulder_yaw_r_joint', 'elbow_r_joint']

  upper_dof_names: ['shoulder_pitch_l_joint', 'shoulder_roll_l_joint', 'shoulder_yaw_l_joint', 'elbow_l_joint',
                    'shoulder_pitch_r_joint', 'shoulder_roll_r_joint', 'shoulder_yaw_r_joint', 'elbow_r_joint']

  upper_left_arm_dof_names: ['shoulder_pitch_l_joint', 'shoulder_roll_l_joint', 'shoulder_yaw_l_joint', 'elbow_l_joint']
  
  upper_right_arm_dof_names: ['shoulder_pitch_r_joint', 'shoulder_roll_r_joint', 'shoulder_yaw_r_joint', 'elbow_r_joint']

  lower_dof_names: ['hip_roll_l_joint', 'hip_yaw_l_joint', 'hip_pitch_l_joint', 'knee_pitch_l_joint', 'ankle_pitch_l_joint', 'ankle_roll_l_joint',
                    'hip_roll_r_joint', 'hip_yaw_r_joint', 'hip_pitch_r_joint', 'knee_pitch_r_joint', 'ankle_pitch_r_joint', 'ankle_roll_r_joint',
                    'waist_joint']

  waist_dof_names: ['waist_joint']
  dof_pos_lower_limit_list: [-2.5307, -0.5236, -2.7576, -0.087267, -0.87267, -0.2618, 
                             -2.5307, -2.9671, -2.7576, -0.087267, -0.87267, -0.2618, 
                             -2.618,
                             -3.0892, -1.5882, -2.618, -1.0472, -1.972222054,
                             -3.0892, -2.2515, -2.618, -1.0472, -1.972222054]
  dof_pos_upper_limit_list: [2.8798, 2.9671, 2.7576, 2.8798, 0.5236, 0.2618, 
                             2.8798, 0.5236, 2.7576, 2.8798, 0.5236, 0.2618, 
                             2.618,
                             2.6704, 2.2515, 2.618, 2.0944, 1.972222054,
                             2.6704, 1.5882, 2.618, 2.0944, 1.972222054]
  dof_vel_limit_list: [32.0, 32.0, 32.0, 20.0, 37.0, 37.0, 
                       32.0, 32.0, 32.0, 20.0, 37.0, 37.0, 
                       32.0,
                       37.0, 37.0, 37.0, 37.0, 37.0, 
                       37.0, 37.0, 37.0, 37.0, 37.0]
  dof_effort_limit_list: [88.0, 88.0, 88.0, 139.0, 50.0, 50.0, 
                          88.0, 88.0, 88.0, 139.0, 50.0, 50.0, 
                          88.0,
                          25.0, 25.0, 25.0, 25.0, 25.0, 
                          25.0, 25.0, 25.0, 25.0, 25.0]
  
  # only apply for isaacsim
  dof_armature_list: [0.03, 0.03, 0.03, 0.03, 0.03, 0.03,
                      0.03, 0.03, 0.03, 0.03, 0.03, 0.03,
                      0.03,
                      0.03, 0.03, 0.03, 0.03, 0.03,
                      0.04, 0.03, 0.03, 0.03, 0.03]
  # only apply for isaacsim
  dof_joint_friction_list: [0.03, 0.03, 0.03, 0.03, 0.03, 0.03,
                            0.03, 0.03, 0.03, 0.03, 0.03, 0.03,
                            0.03,
                            0.03, 0.03, 0.03, 0.03, 0.03,
                            0.03, 0.03, 0.03, 0.03, 0.03]

  body_names: ['pelvis', 
                'hip_roll_l_link', 'hip_yaw_l_link', 'hip_pitch_l_link', 'knee_pitch_l_link', 'ankle_pitch_l_link', 'ankle_roll_l_link', 
                'hip_roll_r_link', 'hip_yaw_r_link', 'hip_pitch_r_link', 'knee_pitch_r_link', 'ankle_pitch_r_link', 'ankle_roll_r_link', 
                'waist_link', 
                'shoulder_pitch_l_link', 'shoulder_roll_l_link', 'shoulder_yaw_l_link', 'elbow_l_link', 
                'shoulder_pitch_r_link', 'shoulder_roll_r_link', 'shoulder_yaw_r_link', 'elbow_r_link']


  terminate_after_contacts_on : ["pelvis", "shoulder", "hip"]
  penalize_contacts_on: ["pelvis", "shoulder", "hip"]
  init_state:
    pos: [0.0, 0.0, 0.8] # x,y,z [m]
    rot: [0.0, 0.0, 0.0, 1.0] # x,y,z,w [quat]
    lin_vel: [0.0, 0.0, 0.0]  # x,y,z [m/s]
    ang_vel: [0.0, 0.0, 0.0]  # x,y,z [rad/s]
    default_joint_angles: # = target angles [rad] when action = 0.0
      hip_roll_l_joint: 0.
      hip_yaw_l_joint: 0.
      hip_pitch_l_joint: 0.
      knee_pitch_l_joint: 0.
      ankle_pitch_l_joint: 0.
      ankle_roll_l_joint: 0.

      hip_roll_r_joint: 0.
      hip_yaw_r_joint: 0.
      hip_pitch_r_joint: 0.
      knee_pitch_r_joint: 0.
      ankle_pitch_r_joint: 0.
      ankle_roll_r_joint: 0.

      waist_joint : 0.

      shoulder_pitch_l_joint: 0.
      shoulder_roll_l_joint: 0.
      shoulder_yaw_l_joint: 0.
      elbow_l_joint: 0.

      shoulder_pitch_r_joint: 0.
      shoulder_roll_r_joint: 0.
      shoulder_yaw_r_joint: 0.
      elbow_r_joint: 0.




  # randomize_link_body_names: [
  #   'pelvis', 'left_hip_yaw_link', 'left_hip_roll_link', 'left_hip_pitch_link', 'left_knee_link',
  #   'right_hip_yaw_link', 'right_hip_roll_link', 'right_hip_pitch_link', 'right_knee_link',
  # ]

  control:
    control_type: P
    # PD Drive parameters:
    stiffness: # [N*m/rad]
      hip_yaw: 100
      hip_roll: 100
      hip_pitch: 100
      knee: 200
      ankle_pitch: 20
      ankle_roll: 20
      waist: 400
      shoulder_pitch: 90
      shoulder_roll: 60
      shoulder_yaw: 20
      elbow: 60


    damping: # [N*m/rad]  # [N*m*s/rad]
      hip_yaw: 2.5
      hip_roll: 2.5
      hip_pitch: 2.5
      knee: 5.0
      ankle_pitch: 0.2
      ankle_roll: 0.1
      waist: 5.0
      shoulder_pitch: 2.0
      shoulder_roll: 1.0
      shoulder_yaw: 0.4
      elbow: 1.0
      wrist: 1.0

    # action scale: target angle = actionScale * action + defaultAngle
    action_scale: 0.25
    action_clip_value: 100.0
    clip_torques: True

  asset:
    collapse_fixed_joints: True # merge bodies connected by fixed joints. Specific fixed joints can be kept by adding " <... dont_collapse="true">
    replace_cylinder_with_capsule: True
    flip_visual_attachments: False
    armature: 0.001 # isaacgym armature is set by this
    thickness: 0.01
    max_angular_velocity: 1000.
    max_linear_velocity: 1000.
    density: 0.001
    angular_damping: 0.
    linear_damping: 0.

    urdf_file: "t1/${robot.asset.robot_type}.urdf"
    usd_file: "t1/${robot.asset.robot_type}.usd"
    xml_file: "t1/${robot.asset.robot_type}.xml"
    # xml_file: "g1/${robot.asset.robot_type}_fitmotionONLY.xml"
    robot_type: t1_21dof
    self_collisions: 0 # 1 to disable, 0 to enable self collisions
    default_dof_drive_mode: 3

    fix_base_link: False # TEST: fix base link to world

  motion:
    motion_lib_type: 'WJX'
    motion_file : ???
    asset:
      assetRoot: "description/robots/t1/"
      assetFileName: "t1_21dof.xml"
      urdfFileName: "t1_19dof.urdf"

    humanoid_type: t1_19dof
    bias_offset: False
    has_self_collision: True
    has_mesh: False
    has_jt_limit: False
    has_dof_subset: True
    has_upright_start: True
    has_smpl_pd_offset: False
    remove_toe: False # For humanoid's geom toe
    motion_sym_loss: False
    sym_loss_coef: 1
    big_ankle: True

    has_shape_obs: false
    has_shape_obs_disc: false
    has_shape_variation: False

    masterfoot: False
    freeze_toe: false
    freeze_hand: False
    box_body: True
    real_weight: True
    real_weight_porpotion_capsules: True
    real_weight_porpotion_boxes: True

    body_names: ['pelvis', 
                'hip_roll_l_link', 'hip_yaw_l_link', 'hip_pitch_l_link', 'knee_pitch_l_link', 'ankle_pitch_l_link', 'ankle_roll_l_link', 
                'hip_roll_r_link', 'hip_yaw_r_link', 'hip_pitch_r_link', 'knee_pitch_r_link', 'ankle_pitch_r_link', 'ankle_roll_r_link', 
                'waist_link', 
                'shoulder_pitch_l_link', 'shoulder_roll_l_link', 'shoulder_yaw_l_link', 'elbow_l_link', 
                'shoulder_pitch_r_link', 'shoulder_roll_r_link', 'shoulder_yaw_r_link', 'elbow_r_link']



    limb_weight_group: 
      - ['hip_roll_l_link', 'hip_yaw_l_link', 'hip_pitch_l_link', 'knee_pitch_l_link', 'ankle_pitch_l_link', 'ankle_roll_l_link']
      - ['hip_roll_r_link', 'hip_yaw_r_link', 'hip_pitch_r_link', 'knee_pitch_r_link', 'ankle_pitch_r_link', 'ankle_roll_r_link']
      #- ['pelvis', 'waist_yaw_link', 'waist_roll_link', 'torso_link']
      - ['pelvis', 'waist_link']
      - ['shoulder_pitch_l_link', 'shoulder_roll_l_link', 'shoulder_yaw_l_link', 'elbow_l_link']
      - ['shoulder_pitch_r_link', 'shoulder_roll_r_link', 'shoulder_yaw_r_link', 'elbow_r_link']

    dof_names: ['hip_roll_l_joint', 'hip_yaw_l_joint', 'hip_pitch_l_joint', 'knee_pitch_l_joint', 'ankle_pitch_l_joint', 'ankle_roll_l_joint',
              'hip_roll_r_joint', 'hip_yaw_r_joint', 'hip_pitch_r_joint', 'knee_pitch_r_joint', 'ankle_pitch_r_joint', 'ankle_roll_r_joint',
              'waist_joint',
              'shoulder_pitch_l_joint', 'shoulder_roll_l_joint', 'shoulder_yaw_l_joint', 'elbow_l_joint',
              'shoulder_pitch_r_joint', 'shoulder_roll_r_joint', 'shoulder_yaw_r_joint', 'elbow_r_joint']
    right_foot_name: 'r_foot_roll'
    left_foot_name: 'l_foot_roll'


    nums_extend_bodies: 3
    extend_config:
      - joint_name: "left_hand_link"
        parent_name: "elbow_l_link"
        pos: [0.0, 0.0, -0.25]
        rot: [1.0, 0.0, 0.0, 0.0] # w x y z
      - joint_name: "right_hand_link"
        parent_name: "elbow_r_link"
        pos: [0.0, 0.0, -0.25]
        rot: [1.0, 0.0, 0.0, 0.0] # w x y z
      - joint_name: "head_link"
        parent_name: "pelvis"
        pos: [0.0, 0.0, 0.4]
        rot: [1.0, 0.0, 0.0, 0.0] # w x y z


    motion_tracking_link:
      - "left_hand_link"
      - "right_hand_link"
      - "head_link"

    lower_body_link:
      - "pelvis"
      - "hip_roll_l_link"
      - "hip_yaw_l_link"
      - "hip_pitch_l_link"
      - "knee_pitch_l_link"
      - "ankle_pitch_l_link"
      - "ankle_roll_l_link"
      - "hip_roll_r_link"
      - "hip_yaw_r_link"
      - "hip_pitch_r_link"
      - "knee_pitch_r_link"
      - "ankle_pitch_r_link"
      - "ankle_roll_r_link"
      - "waist_link"

    upper_body_link:
      - "shoulder_pitch_l_link"
      - "shoulder_roll_l_link"
      - "shoulder_yaw_l_link"
      - "elbow_l_link"
      - "shoulder_pitch_r_link"
      - "shoulder_roll_r_link"
      - "shoulder_yaw_r_link"
      - "elbow_r_link"
      - "left_hand_link"
      - "right_hand_link"
      - "head_link"


    pelvis_link: "pelvis"
    base_link: "waist_link"
    hips_link:
      - "hip_roll_l_link"
      - "hip_yaw_l_link"
      - "hip_pitch_l_link"
      - "hip_roll_r_link"
      - "hip_yaw_r_link"
      - "hip_pitch_r_link"
    
    joint_matches:
      - ["pelvis", "Pelvis"]
      - ["hip_roll_l_link", "L_Hip"]
      - ["knee_pitch_l_link", "L_Knee"]
      - ["ankle_roll_l_link", "L_Ankle"]
      - ["hip_roll_r_link", "R_Hip"]
      - ["knee_pitch_r_link", "R_Knee"]
      - ["ankle_roll_r_link", "R_Ankle"]
      - ["shoulder_roll_l_link", "L_Shoulder"]
      - ["elbow_l_link", "L_Elbow"]
      - ["left_hand_link", "L_Hand"]
      - ["shoulder_roll_r_link", "R_Shoulder"]
      - ["elbow_r_link", "R_Elbow"]
      - ["right_hand_link", "R_Hand"]
      - ["head_link", "Head"]
      - ["left_toe_link", "L_Toe"]
      - ["right_toe_link", "R_Toe"]


    smpl_pose_modifier:
      - Pelvis: "[np.pi/2, 0, np.pi/2]"
      - L_Shoulder: "[0, 0, -np.pi/2]"
      - R_Shoulder: "[0, 0, np.pi/2]"
      - L_Elbow: "[0, -np.pi/2, 0]"
      - R_Elbow: "[0, np.pi/2, 0]"

    visualization:
      customize_color : True
      marker_joint_colors : 
      - [0.929, 0.867, 0.437] # pelvis
      - [0.929, 0.867, 0.437] # left_hip_yaw_joint
      - [0.929, 0.867, 0.437] # left_hip_roll_joint
      - [0.929, 0.867, 0.437] # left_hip_pitch_joint
      - [0.929, 0.867, 0.437] # left_knee_joint
      - [0.929, 0.867, 0.437] # left_ankle_pitch_joint
      - [0.929, 0.867, 0.437] # left_ankle_roll_joint
      - [0.929, 0.867, 0.437] # right_hip_yaw_joint
      - [0.929, 0.867, 0.437] # right_hip_roll_joint
      - [0.929, 0.867, 0.437] # right_hip_pitch_joint
      - [0.929, 0.867, 0.437] # right_knee_joint
      - [0.929, 0.867, 0.437] # right_ankle_pitch_joint
      - [0.929, 0.867, 0.437] # right_ankle_roll_joint
      - [0.929, 0.867, 0.437] # waist_yaw_joint
      - [0.929, 0.867, 0.437] # waist_roll_joint
      - [0.929, 0.867, 0.437] # torso_joint (waist_pitch_link)
      - [0.929, 0.867, 0.437] # left_shoulder_pitch_joint
      - [0.929, 0.867, 0.437] # left_shoulder_roll_joint
      - [0.929, 0.867, 0.437] # left_shoulder_yaw_joint
      - [0.929, 0.867, 0.437] # left_elbow_joint
      - [0.929, 0.867, 0.437] # right_shoulder_pitch_joint
      - [0.929, 0.867, 0.437] # right_shoulder_roll_joint
      - [0.929, 0.867, 0.437] # right_shoulder_yaw_joint
      - [0.929, 0.867, 0.437] # right_elbow_joint
      - [0, 0.351, 0.613] # left_elbow_joint_extend
      - [0, 0.351, 0.613] # right_elbow_joint_extend
      - [0, 0.351, 0.613] # head_link

